{% extends "ScreenCritic/base.html" %}
{% load staticfiles %}

{% block title %}Write a Review - ScreenCritic{% endblock %}

{% block content %}
<div class="review-container">
    <h1>Write a Review</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}  <!-- Automatically renders fields -->
        
        <button type="submit" class="submit-btn">Submit</button>
        <button type="reset" class="cancel-btn">Cancel</button>
    </form>
</div>

    <style>
        /* Review Form Styling */
        .review-container {
            width: 50%;
            margin: auto;
            padding: 20px;
            border-radius: 8px;
            background: white;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.1);
        }

        .review-container h1 {
            text-align: center;
            margin-bottom: 15px;
        }

        /* Star Rating */
        .rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: center;
            gap: 5px;
            margin-bottom: 10px;
        }

        .rating input {
            display: none;
        }

        .rating label {
            font-size: 30px;
            color: #ccc;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .rating input:checked ~ label,
        .rating label:hover,
        .rating label:hover ~ label {
            color: #FFD700; /* Gold color */
        }
    </style>

{% endblock %}
